<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>winSVG</title>
<style>
  :root {
    --toolbar-bg: rgba(30, 30, 30, 0.92);
    --toolbar-fg: #e8e8e8;
    --accent: #4da3ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: "Segoe UI", system-ui, sans-serif; }

  /* --- Stage backgrounds (cycled with the B key / button).
         White ("with background") is the default preview mode. --- */
  body.bg-checker {
    background-color: #ffffff;
    background-image:
      linear-gradient(45deg, #d9d9d9 25%, transparent 25%, transparent 75%, #d9d9d9 75%),
      linear-gradient(45deg, #d9d9d9 25%, transparent 25%, transparent 75%, #d9d9d9 75%);
    background-size: 20px 20px;
    background-position: 0 0, 10px 10px;
  }
  body.bg-white { background: #ffffff; }
  body.bg-black { background: #111111; }

  #stage { position: absolute; inset: 0; cursor: grab; }
  #stage.panning { cursor: grabbing; }

  #svgImage {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    /* Keep vector edges crisp when scaled by the browser. */
    image-rendering: -webkit-optimize-contrast;
    user-select: none;
    -webkit-user-drag: none;
    display: none;
  }

  /* --- Bottom toolbar --- */
  #toolbar {
    position: absolute;
    left: 50%;
    bottom: 18px;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 10px;
    background: var(--toolbar-bg);
    color: var(--toolbar-fg);
    border-radius: 10px;
    box-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
    font-size: 13px;
    z-index: 10;
    white-space: nowrap;
  }
  #toolbar button {
    background: transparent;
    color: var(--toolbar-fg);
    border: none;
    border-radius: 6px;
    padding: 5px 9px;
    font-size: 13px;
    cursor: pointer;
  }
  #toolbar button:hover { background: rgba(255, 255, 255, 0.12); }
  #toolbar .divider { width: 1px; height: 18px; background: rgba(255, 255, 255, 0.2); margin: 0 4px; }
  #fileLabel { max-width: 340px; overflow: hidden; text-overflow: ellipsis; padding: 0 6px; }
  #zoomLabel { min-width: 52px; text-align: center; color: var(--accent); }
  #positionLabel { color: #9a9a9a; padding: 0 6px; }
  #dimensionsLabel { color: #9a9a9a; padding: 0 6px; }

  /* --- Export panel --- */
  #exportPanel {
    position: absolute;
    left: 50%;
    bottom: 66px;
    transform: translateX(-50%);
    display: none;
    flex-direction: column;
    gap: 10px;
    padding: 14px 16px;
    background: var(--toolbar-bg);
    color: var(--toolbar-fg);
    border-radius: 10px;
    box-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
    font-size: 13px;
    z-index: 11;
  }
  #exportPanel.open { display: flex; }
  .exportRow { display: flex; align-items: center; gap: 10px; }
  .exportLabel { width: 84px; color: #b8b8b8; }
  .segmented { display: flex; gap: 2px; background: rgba(255,255,255,0.08); border-radius: 7px; padding: 2px; }
  .segmented button {
    background: transparent;
    color: var(--toolbar-fg);
    border: none;
    border-radius: 5px;
    padding: 4px 12px;
    font-size: 12.5px;
    cursor: pointer;
  }
  .segmented button.active { background: var(--accent); color: #10233f; font-weight: 600; }
  .segmented button:disabled { opacity: 0.35; cursor: default; }
  #exportSizeHint { color: #9a9a9a; flex: 1; }
  #downloadButton {
    background: var(--accent);
    color: #10233f;
    border: none;
    border-radius: 7px;
    padding: 7px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  #downloadButton:hover { filter: brightness(1.1); }

  /* --- Empty-state hint shown before any file is loaded --- */
  #emptyHint {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #8a8a8a;
    font-size: 15px;
    pointer-events: none;
  }
</style>
</head>
<body class="bg-white">
  <div id="stage">
    <img id="svgImage" alt="SVG preview">
  </div>

  <div id="emptyHint">Press Ctrl+O to open an SVG file</div>

  <div id="exportPanel">
    <div class="exportRow">
      <span class="exportLabel">Format</span>
      <div class="segmented" id="formatChoice">
        <button data-value="png" class="active">PNG</button>
        <button data-value="jpeg">JPG</button>
        <button data-value="webp">WebP</button>
      </div>
    </div>
    <div class="exportRow">
      <span class="exportLabel">Background</span>
      <div class="segmented" id="backgroundChoice">
        <button data-value="white" class="active">White</button>
        <button data-value="black">Black</button>
        <button data-value="transparent">Transparent</button>
      </div>
    </div>
    <div class="exportRow">
      <span class="exportLabel">Scale</span>
      <div class="segmented" id="scaleChoice">
        <button data-value="1" class="active">×1</button>
        <button data-value="2">×2</button>
        <button data-value="4">×4</button>
      </div>
    </div>
    <div class="exportRow">
      <span id="exportSizeHint"></span>
      <button id="downloadButton">Download</button>
    </div>
  </div>

  <div id="toolbar">
    <button id="prevButton" title="Previous file (←)">◀</button>
    <span id="positionLabel">–/–</span>
    <button id="nextButton" title="Next file (→)">▶</button>
    <span class="divider"></span>
    <span id="fileLabel">No file</span>
    <span id="dimensionsLabel"></span>
    <span class="divider"></span>
    <button id="zoomOutButton" title="Zoom out (-)">−</button>
    <span id="zoomLabel">100%</span>
    <button id="zoomInButton" title="Zoom in (+)">＋</button>
    <button id="fitButton" title="Fit to window (0)">Fit</button>
    <button id="actualSizeButton" title="Actual size (1)">1:1</button>
    <span class="divider"></span>
    <button id="backgroundButton" title="Cycle background (B)">▦ BG</button>
    <button id="exportButton" title="Export as image (Ctrl+S)">⭳ Export</button>
    <button id="openButton" title="Open file (Ctrl+O)">Open…</button>
  </div>

<script>
"use strict";

/**
 * Viewer state: current zoom scale and pan offset applied to the SVG image,
 * plus the image's natural pixel size once it has loaded.
 */
const viewerState = {
  zoomScale: 1,
  panOffsetX: 0,
  panOffsetY: 0,
  naturalWidth: 0,
  naturalHeight: 0,
  hasImage: false,
};

const MIN_ZOOM_SCALE = 0.02;
const MAX_ZOOM_SCALE = 64;
// White first: "with background" is the default preview mode.
const BACKGROUND_CLASSES = ["bg-white", "bg-checker", "bg-black"];
let activeBackgroundIndex = 0;

const stageElement = document.getElementById("stage");
const svgImageElement = document.getElementById("svgImage");
const emptyHintElement = document.getElementById("emptyHint");
const fileLabelElement = document.getElementById("fileLabel");
const positionLabelElement = document.getElementById("positionLabel");
const dimensionsLabelElement = document.getElementById("dimensionsLabel");
const zoomLabelElement = document.getElementById("zoomLabel");

/**
 * Posts a message object to the C# host window.
 * @param {object} messagePayload - Message with a "command" property understood by MainWindow.
 */
function postMessageToHost(messagePayload) {
  if (window.chrome && window.chrome.webview) {
    window.chrome.webview.postMessage(messagePayload);
  }
}

/**
 * Posts a simple command (no extra data) to the C# host window.
 * @param {string} commandName - Command identifier understood by MainWindow.
 */
function postCommandToHost(commandName) {
  postMessageToHost({ command: commandName });
}

/**
 * Applies the current zoom scale and pan offset to the image element.
 */
function applyViewTransform() {
  svgImageElement.style.transform =
    `translate(${viewerState.panOffsetX}px, ${viewerState.panOffsetY}px) scale(${viewerState.zoomScale})`;
  zoomLabelElement.textContent = `${Math.round(viewerState.zoomScale * 100)}%`;
}

/**
 * Scales the image so it fits entirely inside the stage with a small margin,
 * then centers it. Never scales above 100% for small images.
 */
function fitImageToStage() {
  if (!viewerState.hasImage) return;
  const stageWidth = stageElement.clientWidth;
  const stageHeight = stageElement.clientHeight;
  const fitMargin = 40;
  const fitScale = Math.min(
    (stageWidth - fitMargin) / viewerState.naturalWidth,
    (stageHeight - fitMargin) / viewerState.naturalHeight,
    1
  );
  viewerState.zoomScale = Math.max(fitScale, MIN_ZOOM_SCALE);
  centerImageInStage();
}

/**
 * Shows the image at its natural (100%) pixel size, centered in the stage.
 */
function showImageAtActualSize() {
  if (!viewerState.hasImage) return;
  viewerState.zoomScale = 1;
  centerImageInStage();
}

/**
 * Centers the image within the stage at the current zoom scale.
 */
function centerImageInStage() {
  viewerState.panOffsetX = (stageElement.clientWidth - viewerState.naturalWidth * viewerState.zoomScale) / 2;
  viewerState.panOffsetY = (stageElement.clientHeight - viewerState.naturalHeight * viewerState.zoomScale) / 2;
  applyViewTransform();
}

/**
 * Zooms toward a specific point on the stage so the content under the cursor
 * stays put while the scale changes.
 * @param {number} zoomFactor - Multiplier applied to the current scale.
 * @param {number} anchorX - X coordinate (stage space) to keep stationary.
 * @param {number} anchorY - Y coordinate (stage space) to keep stationary.
 */
function zoomAroundPoint(zoomFactor, anchorX, anchorY) {
  if (!viewerState.hasImage) return;
  const previousScale = viewerState.zoomScale;
  const nextScale = Math.min(MAX_ZOOM_SCALE, Math.max(MIN_ZOOM_SCALE, previousScale * zoomFactor));
  const effectiveFactor = nextScale / previousScale;

  viewerState.panOffsetX = anchorX - (anchorX - viewerState.panOffsetX) * effectiveFactor;
  viewerState.panOffsetY = anchorY - (anchorY - viewerState.panOffsetY) * effectiveFactor;
  viewerState.zoomScale = nextScale;
  applyViewTransform();
}

/**
 * Loads a new SVG file into the viewer. Invoked by the C# host through
 * ExecuteScriptAsync whenever the current file changes.
 * @param {string} imageSource - Virtual-host URL or data: URI of the SVG.
 * @param {string} displayFileName - File name shown in the toolbar.
 * @param {number} positionInFolder - 1-based index among sibling SVG files.
 * @param {number} totalInFolder - Total count of sibling SVG files.
 * @param {boolean} [isFallbackAttempt] - True when the host re-sent the file
 *   as a data: URI after the URL-based load failed; suppresses further retry.
 */
function showFile(imageSource, displayFileName, positionInFolder, totalInFolder, isFallbackAttempt) {
  fileLabelElement.textContent = displayFileName;
  fileLabelElement.title = displayFileName;
  positionLabelElement.textContent = `${positionInFolder}/${totalInFolder}`;

  svgImageElement.onload = () => {
    viewerState.naturalWidth = svgImageElement.naturalWidth || 300;
    viewerState.naturalHeight = svgImageElement.naturalHeight || 150;
    viewerState.hasImage = true;
    dimensionsLabelElement.textContent = `${viewerState.naturalWidth}×${viewerState.naturalHeight}`;
    svgImageElement.style.display = "block";
    emptyHintElement.style.display = "none";
    fitImageToStage();
    // Refit on the next frame in case the window/DPI layout settles after load.
    requestAnimationFrame(fitImageToStage);
    updateExportSizeHint();
    postCommandToHost("imageLoaded");
  };
  svgImageElement.onerror = () => {
    if (!isFallbackAttempt) {
      // Ask the C# host to re-send the file content as a data: URI.
      postCommandToHost("imageLoadFailed");
      return;
    }
    svgImageElement.style.display = "none";
    emptyHintElement.style.display = "flex";
    emptyHintElement.textContent = `Could not load ${displayFileName}`;
  };

  svgImageElement.src = imageSource;
}

/* --- Mouse wheel: zoom around the cursor --- */
stageElement.addEventListener("wheel", (wheelEvent) => {
  wheelEvent.preventDefault();
  const zoomFactor = wheelEvent.deltaY < 0 ? 1.2 : 1 / 1.2;
  zoomAroundPoint(zoomFactor, wheelEvent.clientX, wheelEvent.clientY);
}, { passive: false });

/* --- Mouse drag: pan --- */
let isPanning = false;
let lastPointerX = 0;
let lastPointerY = 0;

stageElement.addEventListener("pointerdown", (pointerEvent) => {
  if (pointerEvent.button !== 0) return;
  isPanning = true;
  lastPointerX = pointerEvent.clientX;
  lastPointerY = pointerEvent.clientY;
  stageElement.classList.add("panning");
  stageElement.setPointerCapture(pointerEvent.pointerId);
});

stageElement.addEventListener("pointermove", (pointerEvent) => {
  if (!isPanning) return;
  viewerState.panOffsetX += pointerEvent.clientX - lastPointerX;
  viewerState.panOffsetY += pointerEvent.clientY - lastPointerY;
  lastPointerX = pointerEvent.clientX;
  lastPointerY = pointerEvent.clientY;
  applyViewTransform();
});

stageElement.addEventListener("pointerup", () => {
  isPanning = false;
  stageElement.classList.remove("panning");
});

/* --- Double-click: toggle between fit and 100% --- */
stageElement.addEventListener("dblclick", () => {
  if (Math.abs(viewerState.zoomScale - 1) < 0.001) {
    fitImageToStage();
  } else {
    showImageAtActualSize();
  }
});

/* ================================ Export ================================ */

const exportPanelElement = document.getElementById("exportPanel");
const formatChoiceElement = document.getElementById("formatChoice");
const backgroundChoiceElement = document.getElementById("backgroundChoice");
const scaleChoiceElement = document.getElementById("scaleChoice");
const exportSizeHintElement = document.getElementById("exportSizeHint");

/**
 * Returns the data-value of the active button in a segmented control.
 * @param {HTMLElement} segmentedGroup - The segmented control container.
 */
function getSelectedSegmentValue(segmentedGroup) {
  return segmentedGroup.querySelector("button.active").dataset.value;
}

/**
 * Wires a segmented control so clicking a button makes it the single active
 * choice, then runs the shared post-change updates.
 * @param {HTMLElement} segmentedGroup - The segmented control container.
 */
function wireSegmentedControl(segmentedGroup) {
  segmentedGroup.querySelectorAll("button").forEach((choiceButton) => {
    choiceButton.addEventListener("click", () => {
      if (choiceButton.disabled) return;
      segmentedGroup.querySelectorAll("button").forEach((b) => b.classList.remove("active"));
      choiceButton.classList.add("active");
      onExportOptionsChanged();
    });
  });
}

/**
 * Keeps export options consistent: JPEG cannot store transparency, so the
 * Transparent choice is disabled (falling back to White) while JPG is
 * selected. Also refreshes the output-size hint.
 */
function onExportOptionsChanged() {
  const selectedFormat = getSelectedSegmentValue(formatChoiceElement);
  const transparentButton = backgroundChoiceElement.querySelector('button[data-value="transparent"]');

  if (selectedFormat === "jpeg") {
    transparentButton.disabled = true;
    if (transparentButton.classList.contains("active")) {
      transparentButton.classList.remove("active");
      backgroundChoiceElement.querySelector('button[data-value="white"]').classList.add("active");
    }
  } else {
    transparentButton.disabled = false;
  }
  updateExportSizeHint();
}

/**
 * Shows the pixel dimensions the current export settings would produce.
 */
function updateExportSizeHint() {
  if (!viewerState.hasImage) {
    exportSizeHintElement.textContent = "";
    return;
  }
  const exportScale = Number(getSelectedSegmentValue(scaleChoiceElement));
  exportSizeHintElement.textContent =
    `Output: ${Math.round(viewerState.naturalWidth * exportScale)}×${Math.round(viewerState.naturalHeight * exportScale)} px`;
}

/**
 * Shows or hides the export panel.
 */
function toggleExportPanel() {
  if (!viewerState.hasImage) return;
  exportPanelElement.classList.toggle("open");
  updateExportSizeHint();
}

/**
 * Kicks off an export with the currently selected options. The C# host
 * responds by calling performExport() with the SVG content as a data: URI
 * (which keeps the canvas untainted regardless of origin rules).
 */
function requestExport() {
  if (!viewerState.hasImage) return;
  postMessageToHost({
    command: "exportImage",
    format: getSelectedSegmentValue(formatChoiceElement),
    background: getSelectedSegmentValue(backgroundChoiceElement),
    scale: Number(getSelectedSegmentValue(scaleChoiceElement)),
  });
}

/**
 * Renders the SVG onto an offscreen canvas at the requested scale and
 * background, encodes it in the chosen format, and sends the result back to
 * the C# host to be saved. Invoked by the host via ExecuteScriptAsync.
 * @param {string} svgDataUri - The SVG content as a data: URI.
 * @param {string} exportFormat - "png", "jpeg" or "webp".
 * @param {number} exportScale - Output multiplier (1, 2 or 4).
 * @param {string} exportBackground - "white", "black" or "transparent".
 * @param {string} baseFileName - Source file name without extension.
 */
function performExport(svgDataUri, exportFormat, exportScale, exportBackground, baseFileName) {
  const offscreenImage = new Image();

  offscreenImage.onload = () => {
    const outputWidth = Math.max(1, Math.round((offscreenImage.naturalWidth || 300) * exportScale));
    const outputHeight = Math.max(1, Math.round((offscreenImage.naturalHeight || 150) * exportScale));

    const exportCanvas = document.createElement("canvas");
    exportCanvas.width = outputWidth;
    exportCanvas.height = outputHeight;
    const canvasContext = exportCanvas.getContext("2d");

    // JPEG has no alpha channel, so it always gets a solid background.
    const needsSolidBackground = exportBackground !== "transparent" || exportFormat === "jpeg";
    if (needsSolidBackground) {
      canvasContext.fillStyle = exportBackground === "black" ? "#000000" : "#ffffff";
      canvasContext.fillRect(0, 0, outputWidth, outputHeight);
    }

    // Chromium re-rasterizes the SVG at the target resolution, so scaled
    // exports stay perfectly sharp.
    canvasContext.drawImage(offscreenImage, 0, 0, outputWidth, outputHeight);

    const mimeTypeByFormat = { png: "image/png", jpeg: "image/jpeg", webp: "image/webp" };
    const encodedDataUrl = exportCanvas.toDataURL(mimeTypeByFormat[exportFormat], 0.95);

    const fileExtension = exportFormat === "jpeg" ? "jpg" : exportFormat;
    const scaleSuffix = exportScale > 1 ? `@${exportScale}x` : "";

    postMessageToHost({
      command: "saveExportedImage",
      dataUrl: encodedDataUrl,
      suggestedFileName: `${baseFileName}${scaleSuffix}.${fileExtension}`,
    });
  };

  offscreenImage.src = svgDataUri;
}

wireSegmentedControl(formatChoiceElement);
wireSegmentedControl(backgroundChoiceElement);
wireSegmentedControl(scaleChoiceElement);
document.getElementById("exportButton").addEventListener("click", toggleExportPanel);
document.getElementById("downloadButton").addEventListener("click", requestExport);

/* ============================== Background ============================== */

/**
 * Advances to the next background style (white → checkerboard → black).
 */
function cycleBackground() {
  document.body.classList.remove(BACKGROUND_CLASSES[activeBackgroundIndex]);
  activeBackgroundIndex = (activeBackgroundIndex + 1) % BACKGROUND_CLASSES.length;
  document.body.classList.add(BACKGROUND_CLASSES[activeBackgroundIndex]);
}

/* --- Toolbar buttons --- */
document.getElementById("prevButton").addEventListener("click", () => postCommandToHost("navigatePrevious"));
document.getElementById("nextButton").addEventListener("click", () => postCommandToHost("navigateNext"));
document.getElementById("openButton").addEventListener("click", () => postCommandToHost("openFileDialog"));
document.getElementById("fitButton").addEventListener("click", fitImageToStage);
document.getElementById("actualSizeButton").addEventListener("click", showImageAtActualSize);
document.getElementById("backgroundButton").addEventListener("click", cycleBackground);
document.getElementById("zoomInButton").addEventListener("click", () =>
  zoomAroundPoint(1.2, stageElement.clientWidth / 2, stageElement.clientHeight / 2));
document.getElementById("zoomOutButton").addEventListener("click", () =>
  zoomAroundPoint(1 / 1.2, stageElement.clientWidth / 2, stageElement.clientHeight / 2));

/* --- Keyboard shortcuts --- */
window.addEventListener("keydown", (keyEvent) => {
  if (keyEvent.ctrlKey && keyEvent.key.toLowerCase() === "o") {
    keyEvent.preventDefault();
    postCommandToHost("openFileDialog");
    return;
  }
  if (keyEvent.ctrlKey && keyEvent.key.toLowerCase() === "s") {
    keyEvent.preventDefault();
    toggleExportPanel();
    return;
  }
  if (keyEvent.key === "Escape" && exportPanelElement.classList.contains("open")) {
    exportPanelElement.classList.remove("open");
    return;
  }
  switch (keyEvent.key) {
    case "ArrowLeft": postCommandToHost("navigatePrevious"); break;
    case "ArrowRight": postCommandToHost("navigateNext"); break;
    case "+": case "=": zoomAroundPoint(1.2, stageElement.clientWidth / 2, stageElement.clientHeight / 2); break;
    case "-": case "_": zoomAroundPoint(1 / 1.2, stageElement.clientWidth / 2, stageElement.clientHeight / 2); break;
    case "0": fitImageToStage(); break;
    case "1": showImageAtActualSize(); break;
    case "b": case "B": cycleBackground(); break;
    case "Escape": postCommandToHost("closeWindow"); break;
  }
});

/* --- Keep the image sensibly placed when the window resizes --- */
window.addEventListener("resize", () => {
  if (viewerState.hasImage) fitImageToStage();
});
</script>
</body>
</html>
